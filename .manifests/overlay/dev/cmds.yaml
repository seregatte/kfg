apiVersion: kfg.dev/v1alpha1
kind: Cmd
metadata:
  name: kfg.overlay.dev.openspec
  commandName: openspec
spec:
  run: |
    echo "OpenSpec dev workflow"
    echo "Change: ${OPENSPEC_CHANGE:-}"
    echo "Action: ${OPENSPEC_ACTION:-}"
    if [ -n "$OPENSPEC_CHANGE" ]; then
      openspec "$OPENSPEC_ACTION" "$OPENSPEC_CHANGE"
    else
      openspec list
    fi
  env:
    OPENSPEC_CHANGE: ""
    OPENSPEC_ACTION: "status"
