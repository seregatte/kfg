apiVersion: kfg.dev/v1alpha1
kind: Assets
metadata:
  name: kfg.extension.openspec.skill
spec:
  input:
    format: yaml
  data:
    name: openspec
    description: OpenSpec skill for managing specifications and changes
    type: skill
    content: |
      OpenSpec is a specification-driven development tool for kfg.
      
      Usage:
      - Create changes with `/openspec-propose`
      - Implement changes with `/openspec-apply`
      - Archive changes with `/openspec-archive`
      
      Specifications live in `docs/context/openspec/`.
