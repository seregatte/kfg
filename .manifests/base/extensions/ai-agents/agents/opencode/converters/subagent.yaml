apiVersion: kfg.dev/v1alpha1
kind: Converter
metadata:
  name: ai.opencode.conv.subagent
spec:
  input:
    format: yaml
  engine:
    expression: |
      "---\nname: " + .name + "\nmode: subagent\ndescription: " + .description + "\nmodel: " + .model + "\n---\n\n" + .prompt
  output:
    format: raw
