apiVersion: kfg.dev/v1alpha1
kind: Converter
metadata:
  name: ai.claude.conv.subagent
spec:
  input:
    format: yaml
  engine:
    expression: |
      "---\nname: " + .name + "\ndescription: " + .description + "\nmodel: " + .model + "\ntools: " + (.tools | @json) + "\npermissions: " + (.permissions | @json) + "\n---\n\n" + .prompt
  output:
    format: raw
