apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: kfg.extension.ctx7.install
spec:
  run: |
    _kfg.log.info "Installing ctx7 skills..."

    # Validate required env vars
    if [ -z "$INSTALL_CMD" ]; then
      _kfg.log.error "missing required env var: INSTALL_CMD"
      exit 1
    fi

    if [ -z "$INSTALL_FLAGS" ]; then
      _kfg.log.error "missing required env var: INSTALL_FLAGS"
      exit 1
    fi

    if [ -z "$AGENT_HOME" ]; then
      _kfg.log.error "missing required env var: AGENT_HOME"
      exit 1
    fi

    _kfg.log.debug "step:ctx7.install" "INSTALL_CMD=$INSTALL_CMD"
    _kfg.log.debug "step:ctx7.install" "INSTALL_FLAGS=$INSTALL_FLAGS"
    _kfg.log.debug "step:ctx7.install" "AGENT_HOME=$AGENT_HOME"

    # Execute install command
    eval "$INSTALL_CMD $INSTALL_FLAGS"

    # Copy skills from agent home
    if [ -d "$AGENT_HOME/skills/" ]; then
      cp -r "$AGENT_HOME/skills/"* "$OUTPUT_DIR/"
      _kfg.log.info "step:ctx7.install" "Copied skills from $AGENT_HOME/skills/"
    fi
  env:
    INSTALL_CMD: "ctx7 setup --cli --project"
    INSTALL_FLAGS: "--yes"
    AGENT_HOME: ".claude"
    OUTPUT_DIR: ".claude/skills/"
  output:
    name: installed
    type: string
