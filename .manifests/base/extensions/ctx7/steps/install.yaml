apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: kfg.extension.ctx7.install
spec:
  run: |
    _kfg.log.info "Installing ctx7 skills..."

    if [ -z "$FLAGS" ]; then
      _kfg.log.error "missing required env var: FLAGS"
      exit 1
    fi

    _kfg.log.debug "step:ctx7.install" "FLAGS=$FLAGS"

    # Execute install command
    ctx7 setup --cli --project $FLAGS

    # If opencode is in FLAGS, move skills before cleanup
    if echo "$FLAGS" | grep -q "opencode"; then
      if [ -n "$OUTPUT_DIR" ]; then
        mkdir -p "$OUTPUT_DIR"
        _kfg.log.debug "step:ctx7.install" "copying skills to $OUTPUT_DIR"
        cp -Rf .agents/skills/* "$OUTPUT_DIR/"
      fi
      _kfg.log.debug "step:ctx7.install" "removing .agents directory"
      rm -rf .agents
    fi

  env:
    FLAGS: "--yes"
    OUTPUT_DIR: ""
  output:
    name: installed
    type: string
