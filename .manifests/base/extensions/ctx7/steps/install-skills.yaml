apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: kfg.extension.ctx7.install-skills
spec:
  run: |
    # Install context7 skills for the current agent
    # Zero conditional logic — all routing handled by workflow when conditions
    local ctx7_flag="${CTX7_FLAG:-}"
    local agent_home="${AGENT_HOME:-}"
    local skills_output_dir="${SKILLS_OUTPUT_DIR:-}"

    if [ -z "$agent_home" ]; then
      _kfg.log.error "AGENT_HOME is required"
      return 1
    fi

    if [ -z "$skills_output_dir" ]; then
      _kfg.log.error "SKILLS_OUTPUT_DIR is required"
      return 1
    fi

    mkdir -p "$skills_output_dir"

    # Copy context7 skill definition
    local mcp_asset="kfg.extension.ctx7.mcp"
    local mcp_data
    mcp_data=$(yq eval-all "select(.kind == \"Assets\" and .metadata.name == \"${mcp_asset}\") | .spec.data" "$KFG_BUILD_RESULT_FILE" 2>/dev/null)

    if [ -n "$mcp_data" ] && [ "$mcp_data" != "null" ]; then
      echo "$mcp_data" | yq eval '.description' > "${skills_output_dir}/context7.txt" 2>/dev/null
      _kfg.log.info "installed context7 skill -> ${skills_output_dir}/context7.txt"
    fi
  env:
    CTX7_FLAG: ""
    AGENT_HOME: ""
    SKILLS_OUTPUT_DIR: ""
