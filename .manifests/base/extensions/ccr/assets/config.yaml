apiVersion: kfg.dev/v1alpha1
kind: Assets
metadata:
  name: kfg.extension.ccr.config
spec:
  input:
    format: yaml
  data:
    name: ccr
    description: Code Change Review configuration
    type: config
    rules:
      - name: conventional-commits
        enabled: true
      - name: test-coverage
        enabled: true
        threshold: 80
      - name: security-scan
        enabled: true
