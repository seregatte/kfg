apiVersion: kfg.dev/v1alpha1
kind: Assets
metadata:
  name: kfg.extension.self.mcp.chrome-devtools
spec:
  input:
    format: yaml
  data:
    name: chrome-devtools
    description: Chrome DevTools MCP server for browser automation and debugging
    enabled: true
    server:
      command: npx
      args:
        - -y
        - chrome-devtools-mcp@latest
      env: {}