apiVersion: kfg.dev/v1alpha1
kind: Assets
metadata:
  name: kfg.extension.playwright.mcp
spec:
  input:
    format: yaml
  data:
    name: playwright
    description: Playwright MCP server for end-to-end browser testing
    enabled: true
    server:
      command: npx
      args:
        - -y
        - "@playwright/mcp@latest"
        - "--extension"
      env: {}