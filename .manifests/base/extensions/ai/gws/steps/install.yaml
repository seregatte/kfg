apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: gws.steps.install
spec:
  run: |
    _kfg.log.info "Installing gws skills..."

    # Validate required env vars
    if [ -z "$SKILL_NAME" ]; then
      _kfg.log.error "missing required env var: SKILL_NAME"
      exit 1
    fi

    if [ -z "$AGENT_FLAG" ]; then
      _kfg.log.error "missing required env var: AGENT_FLAG"
      exit 1
    fi

    _kfg.log.debug "step:gws.install" "SKILL_NAME=$SKILL_NAME"
    _kfg.log.debug "step:gws.install" "AGENT_FLAG=$AGENT_FLAG"

    # Install skill via npx skills add
    npx -y skills add "$SKILL_NAME" --agent "$AGENT_FLAG" --copy --yes

    _kfg.log.info "step:gws.install" "installed"

  env:
    SKILL_NAME: "googleworkspace/cli"
    AGENT_FLAG: "claude-code"
  artifacts:
    - .agents
  output:
    name: installed
    type: string
