apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: playwright.steps.install
spec:
  run: |
    _kfg.log.info "Installing playwright skills..."

    # Validate required env vars
    if [ -z "$OUTPUT_DIR" ]; then
      _kfg.log.error "missing required env var: OUTPUT_DIR"
      exit 1
    fi

    _kfg.log.debug "step:playwright.install" "OUTPUT_DIR=$OUTPUT_DIR"

    # Ensure output directory exists
    mkdir -p "$OUTPUT_DIR"

    # Install playwright CLI skills (installs to .claude/skills/playwright-cli/)
    npx --yes @playwright/cli install --skills

    # Copy generated skills to output directory
    if [ -d ".claude/skills/playwright-cli" ]; then
      cp -R ".claude/skills/playwright-cli" "$OUTPUT_DIR/" 2>/dev/null || true
      _kfg.log.info "step:playwright.install" "Copied playwright-cli skills to $OUTPUT_DIR"
    fi

    # Cleanup temporary .claude directory if it was created by this install
    # (only cleanup the playwright-cli subdirectory to avoid affecting other skills)
    rm -rf ".claude" 2>/dev/null || true

    _kfg.log.info "step:playwright.install" "installed"

  env:
    OUTPUT_DIR: ".claude/skills/"
  output:
    name: installed
    type: string
