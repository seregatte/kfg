apiVersion: kfg.dev/v1alpha1
kind: Assets
metadata:
  name: ai.prompts.refactor-pure
spec:
  input:
    format: yaml
  data:
    name: refactor-pure
    description: Refactor code with a pure functional approach
    prompt: |
      Refactor the specified code to follow pure functional programming principles.
      
      Rules:
      - Eliminate side effects where possible
      - Use immutable data structures
      - Prefer pure functions over methods with state
      - Apply function composition over chaining
      - Maintain existing behavior and test coverage
      
      Input: Provide the file path or code snippet to refactor.
