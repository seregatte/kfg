apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: kfg.cleanup
spec:
  run: |
    _kfg.log.info "cleaning up artifacts..."
    if [ ${#KFG_ARTIFACTS[@]} -eq 0 ]; then
        _kfg.log.info "no artifacts to clean up"
        return 0
    fi
    for artifact in "${KFG_ARTIFACTS[@]}"; do
        if [ -e "$artifact" ]; then
            _kfg.log.info "removing artifact: $artifact"
            rm -rf "$artifact"
        fi
    done
