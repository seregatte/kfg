apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: kfg.merge-config
spec:
  run: |
    local base_file="${BASE:-}"
    local mcp_file="${MCP:-}"
    local target="${TARGET:-}"

    [ -z "$base_file" ] && { _kfg.log.warn "no base file specified"; return 1; }
    [ -z "$mcp_file" ] && { _kfg.log.warn "no mcp file specified"; return 1; }
    [ -z "$target" ] && { _kfg.log.warn "no target file specified"; return 1; }

    [ ! -f "$base_file" ] && { _kfg.log.warn "base file not found: $base_file"; return 1; }
    [ ! -f "$mcp_file" ] && { _kfg.log.warn "mcp file not found: $mcp_file"; return 1; }

    mkdir -p "$(dirname "$target")"

    # Merge base config with MCP (deep merge)
    # Use awk to handle both JSON and mixed output formats
    local base_clean=$(awk '/^\{/,/^\}/' "$base_file" 2>/dev/null | grep -v '^$' | paste -sd '' - || cat "$base_file")
    local mcp_clean=$(awk '/^\{/,/^\}/' "$mcp_file" 2>/dev/null | grep -v '^$' | paste -sd '' - || cat "$mcp_file")
    
    local merged
    merged=$(printf '%s\n---\n%s\n' "$base_clean" "$mcp_clean" \
      | kfg apply -f - --with '. as $item ireduce ({}; . * $item)')

    printf '%s\n' "$merged" > "$target"
    _kfg.log.info "merged ${base_file} and ${mcp_file} into ${target}"

    __kfg_add_artifact "${target}"
  artifacts:
    - config
  env:
    BASE: ""
    MCP: ""
    TARGET: ""
