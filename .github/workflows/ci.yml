name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: src
        run: go build ./cmd/kfg

      - name: Test
        working-directory: src
        run: go test ./...

      - name: Run vet
        working-directory: src
        run: go vet ./...