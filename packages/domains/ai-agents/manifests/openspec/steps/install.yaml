apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: openspec.steps.install
spec:
  run: |
    __kfg_log_info "Installing openspec skills..."

    # Validate required env vars
    if [ -z "$TOOLS_FLAG" ]; then
      __kfg_log_error "missing required env var: TOOLS_FLAG"
      exit 1
    fi

    if [ -z "$AGENT_HOME" ]; then
      __kfg_log_error "missing required env var: AGENT_HOME"
      exit 1
    fi

    if [ -z "$OUTPUT_DIR" ]; then
      __kfg_log_error "missing required env var: OUTPUT_DIR"
      exit 1
    fi

    __kfg_log_debug "step:openspec.install" "TOOLS_FLAG=$TOOLS_FLAG"
    __kfg_log_debug "step:openspec.install" "AGENT_HOME=$AGENT_HOME"
    __kfg_log_debug "step:openspec.install" "OUTPUT_DIR=$OUTPUT_DIR"

    # Ensure output directory exists
    mkdir -p "$OUTPUT_DIR"

    # Execute openspec init command
    command openspec init "$TOOLS_FLAG" --force > /dev/null 2>&1

    rm -Rf openspec
    
    # Track the created agent home directory
    __kfg_add_artifact "$AGENT_HOME"
    
    __kfg_log_info "step:openspec.install" "installed"

  env:
    TOOLS_FLAG: "--tools=claude"
    AGENT_HOME: ".claude"
    OUTPUT_DIR: ".claude/skills/"
  output:
    name: installed
    type: string
  cache:
    enabled: true
    key: openspec-install
