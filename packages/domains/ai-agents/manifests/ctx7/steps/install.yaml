apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: ctx7.steps.install
spec:
  run: |
    __kfg_log_info "Installing ctx7 skills..."

    # Validate required env vars
    if [ -z "$FLAGS" ]; then
      __kfg_log_error "missing required env var: FLAGS"
      exit 1
    fi

    if [ -z "$OUTPUT_DIR" ]; then
      __kfg_log_error "missing required env var: OUTPUT_DIR"
      exit 1
    fi

    __kfg_log_debug "step:ctx7.install" "FLAGS=$FLAGS"
    __kfg_log_debug "step:ctx7.install" "OUTPUT_DIR=$OUTPUT_DIR"

    # Determine agent from FLAGS
    AGENT=""
    if echo "$FLAGS" | grep -q "claude"; then
      AGENT="claude"
    elif echo "$FLAGS" | grep -q "opencode"; then
      AGENT="opencode"
    elif echo "$FLAGS" | grep -q "gemini"; then
      AGENT="gemini"
    elif echo "$FLAGS" | grep -q "pi"; then
      AGENT="pi"
    fi

    # Ensure output directory exists
    mkdir -p "$OUTPUT_DIR"

    # Execute install command
    ctx7 setup --cli --project $FLAGS > /dev/null 2>&1

    # Determine source directory based on FLAGS
    SKILL_SRC=""
    if [ -n "$AGENT" ]; then
      SKILL_SRC=".${AGENT}/skills"
    fi

    # Copy generated skills into OUTPUT_DIR
    if [ -n "$SKILL_SRC" ] && [ -d "$SKILL_SRC" ]; then
      cp -Rf "$SKILL_SRC"/* "$OUTPUT_DIR/" 2>/dev/null || true
      __kfg_log_info "step:ctx7.install" "Copied skills from $SKILL_SRC to $OUTPUT_DIR"
      __kfg_add_artifact "$OUTPUT_DIR"
    else
      __kfg_log_debug "step:ctx7.install" "No skills directory found at $SKILL_SRC"
    fi

    # Extract ctx7 context for output
    CONTEXT_FILE=".${AGENT}/ctx7-agents.md"
    CTX7_CONTENT=""
    if [ -f "$CONTEXT_FILE" ]; then
      # Extract content between <!-- context7 --> markers
      if grep -q '<!-- context7 -->' "$CONTEXT_FILE"; then
        CTX7_CONTENT=$(sed -n '/^<!-- context7 -->$/,/^<!-- context7 -->$/p' "$CONTEXT_FILE" | sed '1d;$d')
        __kfg_log_debug "step:ctx7.install" "Extracted ctx7 context from $CONTEXT_FILE"
      else
        __kfg_log_debug "step:ctx7.install" "No <!-- context7 --> markers found in $CONTEXT_FILE"
      fi
    else
      __kfg_log_debug "step:ctx7.install" "Context file not found: $CONTEXT_FILE"
    fi

    # Cleanup temporary agent home if opencode
    if [ "$AGENT" = "opencode" ]; then
      __kfg_log_debug "step:ctx7.install" "removing .agents directory"
      rm -rf .agents
    fi

    __kfg_log_info "step:ctx7.install" "installed"

    # Output ctx7 context (will be captured by kfg)
    echo "$CTX7_CONTENT"

  env:
    FLAGS: "--yes"
    OUTPUT_DIR: ""
  output:
    name: ctx7_context
    type: string
  cache:
    enabled: true
    key: ctx7-install
