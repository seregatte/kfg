apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: notebooklm.steps.install
spec:
  run: |
    __kfg_log_info "Installing notebooklm skills..."

    # Validate required env vars
    if [ -z "$OUTPUT_DIR" ]; then
      __kfg_log_error "missing required env var: OUTPUT_DIR"
      exit 1
    fi

    __kfg_log_debug "step:notebooklm.install" "OUTPUT_DIR=$OUTPUT_DIR"

    # Ensure output directory exists
    mkdir -p "$OUTPUT_DIR"

    # Execute notebooklm skill install (installs to ~/.claude/skills/notebooklm/)
    notebooklm skill install > /dev/null 2>&1

    # Copy generated NotebookLM skill files into overlay-owned output paths
    if [ -d "$HOME/.claude/skills/notebooklm" ]; then
      cp -r "$HOME/.claude/skills/notebooklm"/* "$OUTPUT_DIR/" 2>/dev/null || rm -Rf "$HOME/.claude/skills/notebooklm" || true
      rm -Rf "$HOME/.agents/skills/notebooklm" || true
      __kfg_log_info "step:notebooklm.install" "Copied skills from ~/.claude/skills/notebooklm to $OUTPUT_DIR"
    fi

    __kfg_log_info "step:notebooklm.install" "installed"

  env:
    OUTPUT_DIR: ".claude/skills/"
  output:
    name: installed
    type: string
  cache:
    enabled: true
    key: notebooklm-install
