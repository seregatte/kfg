apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# AI agents domain package public entrypoint
# This kustomization composes the framework package and domain-specific manifests
# Consumers should reference this file, not internal domain paths

namespace: default

resources:
  - ../../framework/
  - manifests/
  

