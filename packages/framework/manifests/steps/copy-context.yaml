apiVersion: kfg.dev/v1alpha1
kind: Step
metadata:
  name: kfg.copy-context
spec:
  run: |
    local src="${SRC:-}"
    local dest="${DEST:-}"
    local output_dir="${OUTPUT_DIR:-.}"
    
    [ -z "$src" ] && { _kfg.log.warn "no source specified"; return 0; }
    
    [ -z "$dest" ] && dest=$(basename "$src")
    
    local target="${output_dir}/${dest}"
    
    if [ -f "$src" ]; then
      mkdir -p "$(dirname "$target")"
      cp "$src" "$target" 2>/dev/null || true
      __kfg_add_artifact "$dest"
      _kfg.log.info "copied file: ${src} -> ${dest}"
    elif [ -d "$src" ]; then
      mkdir -p "$(dirname "$target")"
      cp -r "$src" "$target" 2>/dev/null || true
      __kfg_add_artifact "$dest"
      _kfg.log.info "copied directory: ${src} -> ${dest}"
    else
      _kfg.log.warn "source not found: ${src}"
    fi
  artifacts:
    - context
  env:
    SRC: ""
    DEST: ""
    OUTPUT_DIR: "."
