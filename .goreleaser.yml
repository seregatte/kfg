# GoReleaser configuration for kfg CLI
# https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kfg
    main: ./src/cmd/kfg
    binary: kfg
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "kfg_{{.Version}}_{{.Os}}_{{.Arch}}"
    format: tar.gz
    files:
      - none*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"